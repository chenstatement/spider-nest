<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因子智蛛 - 一句话，生成万物</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景Canvas */
        #spider-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* 标题区域 */
        .hero-title {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .hero-title h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            margin-bottom: 12px;
        }
        
        .hero-title p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            font-weight: 300;
        }
        
        /* 输入框区域 */
        .input-section {
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        
        .input-wrapper {
            position: relative;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 4px;
            transition: all 0.3s ease;
        }
        
        .input-wrapper:focus-within {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }
        
        .input-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 8px 8px 20px;
        }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 0;
            min-width: 0;
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #0a0a0f;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        
        .generate-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .generate-btn.spinning {
            background: linear-gradient(135deg, #ff9500 0%, #ffb700 100%);
        }
        
        /* 能力标签 */
        .capability-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            max-width: 800px;
        }
        
        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tag:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
            transform: translateY(-2px);
        }
        
        .tag.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.5);
            color: #ffd700;
        }
        
        /* 结果展示区域 */
        .result-section {
            width: 100%;
            max-width: 800px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .result-section.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .result-card {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .result-title {
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .result-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 14px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }
        
        .result-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
        }
        
        /* 加载动画 */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: #0a0a0f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 蜘蛛结网动画 */
        .weaving-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            display: none;
        }
        
        .weaving-animation.show {
            display: block;
        }
        
        .weaving-text {
            color: #ffd700;
            font-size: 1.2rem;
            margin-top: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            z-index: 10;
        }
        
        /* 响应式 */
        @media (max-width: 640px) {
            .input-inner {
                flex-direction: column;
                padding: 12px;
            }
            
            .input-field {
                width: 100%;
                text-align: center;
            }
            
            .generate-btn {
                width: 100%;
                justify-content: center;
            }
            
            .capability-tags {
                gap: 8px;
            }
            
            .tag {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- 蜘蛛网络背景 -->
    <canvas id="spider-canvas"></canvas>
    
    <!-- 结网动画 -->
    <div class="weaving-animation" id="weavingAnimation">
        <div class="spinner" style="width: 40px; height: 40px; border-width: 3px; border-top-color: #ffd700; margin: 0 auto;"></div>
        <div class="weaving-text">蜘蛛结网中...</div>
    </div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 标题 -->
        <div class="hero-title">
            <h1>一句话，生成万物</h1>
            <p>输入你想做的任何事，AI自动完成</p>
        </div>
        
        <!-- 输入区域 -->
        <div class="input-section">
            <div class="input-wrapper">
                <div class="input-inner">
                    <input 
                        type="text" 
                        class="input-field" 
                        id="promptInput"
                        placeholder="我想写一首关于秋天的诗..."
                        autocomplete="off"
                    >
                    <button class="generate-btn" id="generateBtn" onclick="generate()">
                        <span>生成</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 能力标签 -->
        <div class="capability-tags">
            <div class="tag" onclick="setPrompt('📝 写文章', '帮我写一篇关于人工智能的科普文章，面向普通读者')">
                <span>📝</span> 写文章
            </div>
            <div class="tag" onclick="setPrompt('💻 写代码', '用Python写一个爬取网页数据的脚本')">
                <span>💻</span> 写代码
            </div>
            <div class="tag" onclick="setPrompt('🎨 做设计', '设计一个科技公司的Logo，要求简洁现代')">
                <span>🎨</span> 做设计
            </div>
            <div class="tag" onclick="setPrompt('📊 分析数据', '分析这份销售数据，找出增长趋势')">
                <span>📊</span> 分析数据
            </div>
            <div class="tag" onclick="setPrompt('🎵 创作音乐', '写一首关于夏天的流行歌曲歌词')">
                <span>🎵</span> 创作音乐
            </div>
            <div class="tag" onclick="setPrompt('📧 写邮件', '帮我写一封正式的商务合作邮件')">
                <span>📧</span> 写邮件
            </div>
            <div class="tag" onclick="setPrompt('📋 做计划', '制定一个30天健身计划，目标是减脂')">
                <span>📋</span> 做计划
            </div>
            <div class="tag" onclick="setPrompt('🔍 查资料', '总结量子计算的最新进展和应用前景')">
                <span>🔍</span> 查资料
            </div>
        </div>
        
        <!-- 结果展示 -->
        <div class="result-section" id="resultSection">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-title">🕷️ 生成结果</div>
                    <div class="result-actions">
                        <button class="action-btn" onclick="copyResult()">📋 复制</button>
                        <button class="action-btn" onclick="regenerate()">🔄 重新生成</button>
                    </div>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <div class="footer">
        因子蜘蛛 · 隐藏的AI代理网络
    </div>

    <script>
        // ==================== 蜘蛛网络动画 ====================
        const canvas = document.getElementById('spider-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let connections = [];
        let mouse = { x: null, y: null };
        let isWeaving = false;
        
        // 初始化Canvas
        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        // 粒子类（蜘蛛）
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.brightness = Math.random() * 0.5 + 0.5;
            }
            
            update() {
                // 正常飘动
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界反弹
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                
                // 结网时向中心聚集
                if (isWeaving) {
                    const centerX = width / 2;
                    const centerY = height / 2;
                    const dx = centerX - this.x;
                    const dy = centerY - this.y;
                    this.vx += dx * 0.0001;
                    this.vy += dy * 0.0001;
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${this.brightness})`;
                ctx.fill();
                
                // 光晕效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${this.brightness * 0.2})`;
                ctx.fill();
            }
        }
        
        // 初始化粒子
        function initParticles() {
            particles = [];
            const particleCount = Math.min(100, Math.floor((width * height) / 15000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        // 绘制连线
        function drawConnections() {
            const maxDistance = 150;
            const maxConnections = 3;
            
            for (let i = 0; i < particles.length; i++) {
                let connectionCount = 0;
                
                for (let j = i + 1; j < particles.length; j++) {
                    if (connectionCount >= maxConnections) break;
                    
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.4;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 215, 0, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                        connectionCount++;
                    }
                }
            }
            
            // 鼠标连线
            if (mouse.x && mouse.y) {
                particles.forEach(p => {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 200) {
                        const opacity = (1 - distance / 200) * 0.6;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = `rgba(255, 215, 0, ${opacity})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                });
            }
        }
        
        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // 绘制连线
            drawConnections();
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标追踪
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            initCanvas();
            initParticles();
        });
        
        // 初始化
        initCanvas();
        initParticles();
        animate();
        
        // ==================== 业务逻辑 ====================
        
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultSection = document.getElementById('resultSection');
        const resultContent = document.getElementById('resultContent');
        const weavingAnimation = document.getElementById('weavingAnimation');
        
        // 设置Prompt（点击标签）
        function setPrompt(tagName, prompt) {
            promptInput.value = prompt;
            promptInput.focus();
            
            // 高亮标签
            document.querySelectorAll('.tag').forEach(tag => tag.classList.remove('active'));
            event.target.closest('.tag').classList.add('active');
        }
        
        // 生成内容
        async function generate() {
            const prompt = promptInput.value.trim();
            
            if (!prompt) {
                promptInput.focus();
                promptInput.style.animation = 'shake 0.5s';
                setTimeout(() => promptInput.style.animation = '', 500);
                return;
            }
            
            // 开始结网动画
            isWeaving = true;
            weavingAnimation.classList.add('show');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="spinner"></div><span>结网中...</span>';
            generateBtn.classList.add('spinning');
            
            // 隐藏之前的结果
            resultSection.classList.remove('show');
            
            // 模拟API调用（2-3秒）
            await new Promise(resolve => setTimeout(resolve, 2000 + Math.random() * 1000));
            
            // 生成结果（这里接入Kimi API）
            const result = await mockGenerate(prompt);
            
            // 显示结果
            resultContent.textContent = result;
            resultSection.classList.add('show');
            
            // 恢复状态
            isWeaving = false;
            weavingAnimation.classList.remove('show');
            generateBtn.disabled = false;
            generateBtn.innerHTML = '<span>生成</span>';
            generateBtn.classList.remove('spinning');
            
            // 滚动到结果
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // 模拟生成（实际接入Kimi API）
        async function mockGenerate(prompt) {
            // 这里替换为真实的Kimi API调用
            // const response = await fetch('/api/generate', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ prompt })
            // });
            // const data = await response.json();
            // return data.result;
            
            // 模拟结果
            const mockResults = {
                '诗': `秋风起，落叶黄，
万山红遍层林染。
寒蝉凄切声声慢，
独坐西窗夜未央。

霜降已过雁南飞，
菊花残满地香。
一年好景君须记，
最是橙黄橘绿时。`,
                '代码': `# Python爬虫示例
import requests
from bs4 import BeautifulSoup

def crawl_web(url):
    try:
        response = requests.get(url, timeout=10)
        soup = BeautifulSoup(response.text, 'html.parser')
        
        # 提取标题
        title = soup.find('title').text
        
        # 提取所有链接
        links = [a['href'] for a in soup.find_all('a', href=True)]
        
        return {
            'title': title,
            'links': links,
            'status': 'success'
        }
    except Exception as e:
        return {'error': str(e)}

# 使用示例
result = crawl_web('https://example.com')
print(result)`,
                'default': `根据您的需求「${prompt}」，我已为您生成以下内容：

这是一个示例结果。在实际部署中，这里会接入Kimi API，根据您的输入生成真实的内容。

生成的内容可能包括：
• 文章、故事、诗歌
• 代码、脚本、算法
• 设计方案、创意构思
• 数据分析、报告
• 计划、大纲、策略

请继续输入您的需求，体验完整的生成能力。`
            };
            
            if (prompt.includes('诗') || prompt.includes('秋天')) {
                return mockResults['诗'];
            } else if (prompt.includes('代码') || prompt.includes('Python')) {
                return mockResults['代码'];
            } else {
                return mockResults['default'].replace('${prompt}', prompt);
            }
        }
        
        // 复制结果
        function copyResult() {
            const text = resultContent.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                setTimeout(() => btn.textContent = originalText, 2000);
            });
        }
        
        // 重新生成
        function regenerate() {
            generate();
        }
        
        // 回车生成
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generate();
            }
        });
        
        // 输入框placeholder动画
        const placeholders = [
            '我想写一首关于秋天的诗...',
            '帮我写一段Python爬虫代码...',
            '设计一个科技公司的Logo...',
            '分析这份销售数据...',
            '制定一个30天健身计划...'
        ];
        
        let placeholderIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typePlaceholder() {
            const current = placeholders[placeholderIndex];
            
            if (isDeleting) {
                promptInput.setAttribute('placeholder', current.substring(0, charIndex - 1));
                charIndex--;
            } else {
                promptInput.setAttribute('placeholder', current.substring(0, charIndex + 1));
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 50 : 100;
            
            if (!isDeleting && charIndex === current.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                placeholderIndex = (placeholderIndex + 1) % placeholders.length;
                typeSpeed = 500;
            }
            
            setTimeout(typePlaceholder, typeSpeed);
        }
        
        // 启动placeholder动画
        typePlaceholder();
        
        // 添加shake动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
