<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因子智蛛 - 一句话，生成万物</title>
    <meta name="description" content="因子智蛛，一站式AI生成工具，一句话生成文章、代码、设计方案、数据分析、创意内容，全场景覆盖，开箱即用">
    <meta name="keywords" content="AI生成,AI写作,AI代码,因子智蛛,AI工具,一句话生成">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #spider-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-bottom: 80px;
        }
        .hero-title {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title h1 {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            margin-bottom: 12px;
            animation: gradientFlow 4s ease infinite;
        }
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .hero-title p {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 300;
        }
        .input-section {
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        .input-wrapper {
            position: relative;
            background: rgba(20, 20, 30, 0.8);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 4px;
            transition: all 0.3s ease;
        }
        .input-wrapper:hover {
            border-color: rgba(255, 215, 0, 0.35);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        .input-wrapper:focus-within {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }
        .input-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 8px 8px 20px;
        }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 0;
            min-width: 0;
            font-family: inherit;
        }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-field.error { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .char-counter {
            position: absolute;
            right: 140px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }
        .char-counter.warning { color: #ff9500; }
        .generate-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #0a0a0f;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        .generate-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .generate-btn.spinning {
            background: linear-gradient(135deg, #ff9500 0%, #ffb700 100%);
            animation: breathe 1.5s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 149, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 149, 0, 0.6); }
        }
        .recommend-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            max-width: 700px;
            width: 100%;
            position: relative;
        }
        .recommend-title {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            font-weight: 400;
        }
        .recommend-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        .recommend-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .recommend-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
            transform: translateX(4px);
        }
        .recommend-item::before {
            content: '▸';
            color: rgba(255, 215, 0, 0.5);
            font-size: 0.8rem;
        }
        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
        }
        .refresh-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
            transform: rotate(180deg);
        }
        .result-section {
            width: 100%;
            max-width: 800px;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            transition: all 0.5s ease;
        }
        .result-section.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .result-card {
            background: rgba(20, 20, 30, 0.9);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .result-title {
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 14px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .action-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }
        .result-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 1rem;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        .result-content::-webkit-scrollbar { width: 6px; }
        .result-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        .result-content::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 3px;
        }
        .result-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 215, 0, 0.5);
        }
        .result-content h1, .result-content h2, .result-content h3 {
            color: #ffd700;
            margin: 20px 0 12px 0;
        }
        .result-content h1 { font-size: 1.5rem; }
        .result-content h2 { font-size: 1.3rem; }
        .result-content h3 { font-size: 1.1rem; }
        .result-content p { margin-bottom: 12px; }
        .result-content ul, .result-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        .result-content li { margin-bottom: 6px; }
        .result-content code {
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .result-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        .result-content pre code {
            background: transparent;
            padding: 0;
        }
        .result-content blockquote {
            border-left: 3px solid #ffd700;
            padding-left: 16px;
            margin: 12px 0;
            color: rgba(255, 255, 255, 0.7);
        }
        .result-content strong { color: #ffd700; }
        .error-state {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #ff6666;
        }
        .error-state h3 {
            color: #ff6666;
            margin-bottom: 8px;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: #0a0a0f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .weaving-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.8);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            z-index: 998;
            display: none;
        }
        .weaving-overlay.show { display: block; }
        .weaving-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 999;
            display: none;
        }
        .weaving-animation.show { display: block; }
        .weaving-text {
            color: #ffd700;
            font-size: 1.2rem;
            margin-top: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .toast {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 16px 24px;
            color: #ffd700;
            font-size: 0.95rem;
            z-index: 1000;
            transform: translateX(150%);
            transition: transform 0.3s ease;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(0); }
        .toast.error {
            border-color: rgba(255, 50, 50, 0.3);
            color: #ff6666;
        }
        .footer {
            position: relative;
            padding: 20px;
            text-align: center;
            z-index: 10;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .footer-content {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .footer-links a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .footer-links a:hover { color: #ffd700; }
        .footer-copyright {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1001;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            width: 100%;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .modal-close:hover { color: #ffd700; }
        .modal-body {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
        }
        .modal-body h3 {
            color: #ffd700;
            margin: 20px 0 10px 0;
        }
        .modal-body p { margin-bottom: 12px; }

        @media (max-width: 640px) {
            .input-inner {
                flex-direction: column;
                padding: 12px;
            }
            .input-field {
                width: 100%;
                text-align: center;
            }
            .generate-btn {
                width: 100%;
                justify-content: center;
            }
            .char-counter {
                position: static;
                transform: none;
                text-align: center;
                margin-top: 4px;
            }
            .recommend-item {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
            .result-actions {
                width: 100%;
                justify-content: flex-start;
            }
            .action-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            .footer-content { font-size: 0.75rem; }
            .footer-links { gap: 12px; }
            .footer-links a { font-size: 0.7rem; }
        }
        *:focus-visible {
            outline: 2px solid rgba(255, 215, 0, 0.5);
            outline-offset: 2px;
        }
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <canvas id="spider-canvas" aria-hidden="true"></canvas>
    <div class="weaving-overlay" id="weavingOverlay"></div>
    <div class="weaving-animation" id="weavingAnimation" role="status" aria-live="polite" aria-label="生成中">
        <div class="spinner" style="width: 40px; height: 40px; border-width: 3px; border-top-color: #ffd700; margin: 0 auto;"></div>
        <div class="weaving-text" id="weavingText">蜘蛛结网中...</div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    
    <main class="main-container">
        <div class="hero-title">
            <h1>一句话，生成万物</h1>
            <p>输入你的需求，AI一键生成文章/代码/方案/创意，全场景覆盖</p>
        </div>
        
        <section class="input-section" aria-label="输入区域">
            <div class="input-wrapper">
                <div class="input-inner">
                    <input 
                        type="text" 
                        class="input-field" 
                        id="promptInput"
                        placeholder="我想写一首关于秋天的诗..."
                        autocomplete="off"
                        aria-label="输入你的需求"
                        maxlength="2000"
                    >
                    <span class="char-counter" id="charCounter">0/2000</span>
                    <button class="generate-btn" id="generateBtn" aria-label="生成内容">
                        <span>生成</span>
                    </button>
                </div>
            </div>
        </section>
        
        <div class="recommend-section" id="recommendSection">
            <div class="recommend-title">💡 推荐尝试</div>
            <div class="recommend-list" id="recommendList"></div>
            <button class="refresh-btn" id="refreshBtn" title="换一批">🔄</button>
        </div>
        
        <section class="result-section" id="resultSection" aria-label="生成结果">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-title">🕷️ 生成结果</div>
                    <div class="result-actions">
                        <button class="action-btn" id="copyBtn" aria-label="复制结果">📋 复制</button>
                        <button class="action-btn" id="exportBtn" aria-label="导出为文本">📥 导出</button>
                        <button class="action-btn" id="speakBtn" aria-label="朗读">🔊 朗读</button>
                        <button class="action-btn" id="regenerateBtn" aria-label="重新生成">🔄 重新生成</button>
                    </div>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="footer-content">因子智蛛 · 隐藏的AI代理网络</div>
        <div class="footer-links">
            <a href="#" data-modal="privacy">隐私政策</a>
            <a href="#" data-modal="terms">用户协议</a>
            <a href="#" data-modal="disclaimer">免责声明</a>
            <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
            <a href="#" data-modal="feedback">反馈建议</a>
            <a href="#" data-modal="about">关于我们</a>
        </div>
        <div class="footer-copyright">© 2026 因子智蛛 All Rights Reserved</div>
    </footer>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">标题</div>
                <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">内容</div>
        </div>
    </div>

    <script>
        // ==================== 配置常量 ====================
        const CONFIG = {
            MAX_SPIDERS: 80,
            MIN_SPIDERS: 40,
            MAX_PROMPT_LENGTH: 2000,
            HISTORY_LIMIT: 20,
            DEBOUNCE_DELAY: 300,
            LOADING_TEXTS: ['蜘蛛结网中...', '解析需求中...', '生成内容中...', '编织答案中...']
        };
        
        // ==================== 智能蜘蛛网络动画模块 ====================
        const SpiderCanvas = (function() {
            const canvas = document.getElementById('spider-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, spiders = [], webThreads = [], mouse = { x: null, y: null };
            let isWeaving = false, animationId = null, lastFrameTime = 0, frameCount = 0;
            let weavingProgress = 0, centerWeb = null;
            const frameInterval = 1000 / 60;
            
            // 蜘蛛类型配置 - 金色占主导
            const SPIDER_TYPES = [
                { name: 'gold', color: '255, 215, 0', glow: '255, 215, 0', weight: 12, hasLegs: true },
                { name: 'silver', color: '192, 192, 192', glow: '255, 255, 255', weight: 1, hasStardust: true },
                { name: 'purple', color: '157, 78, 221', glow: '200, 100, 255', weight: 1 },
                { name: 'cyan', color: '0, 245, 212', glow: '0, 255, 230', weight: 1, shape: 'square' },
                { name: 'blue', color: '59, 130, 246', glow: '80, 150, 255', weight: 1 },
                { name: 'red', color: '220, 38, 38', glow: '255, 60, 60', weight: 1 },
                { name: 'green', color: '22, 101, 52', glow: '40, 150, 80', weight: 1 },
                { name: 'orange', color: '249, 115, 22', glow: '255, 140, 50', weight: 1 },
                { name: 'white', color: '245, 245, 245', glow: '255, 255, 255', weight: 1, minimal: true }
            ];
            
            // 构建加权数组
            const WEIGHTED_TYPES = [];
            SPIDER_TYPES.forEach(function(t) {
                for (let i = 0; i < t.weight; i++) WEIGHTED_TYPES.push(t);
            });
            
            // 智能蜘蛛类
            class SmartSpider {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.6;
                    this.vy = (Math.random() - 0.5) * 0.6;
                    this.size = Math.random() * 2.5 + 2;
                    this.type = WEIGHTED_TYPES[Math.floor(Math.random() * WEIGHTED_TYPES.length)];
                    this.brightness = Math.random() * 0.3 + 0.7;
                    this.angle = Math.random() * Math.PI * 2;
                    this.legPhase = Math.random() * Math.PI * 2;
                    this.weavingStrength = 0;
                    this.targetX = null;
                    this.targetY = null;
                }
                
                update() {
                    // 结网动画 - 蜘蛛向中心移动并编织
                    if (isWeaving) {
                        this.weavingStrength = Math.min(this.weavingStrength + 0.025, 1);
                        const centerX = width / 2;
                        const centerY = height / 2;
                        
                        // 蜘蛛向中心聚集，形成同心圆分布
                        const angleFromCenter = Math.atan2(this.y - centerY, this.x - centerX);
                        const distFromCenter = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);
                        const targetDist = 80 + (this.size * 15) + Math.sin(this.legPhase) * 30;
                        
                        const targetX = centerX + Math.cos(angleFromCenter + weavingProgress * 0.5) * targetDist;
                        const targetY = centerY + Math.sin(angleFromCenter + weavingProgress * 0.5) * targetDist;
                        
                        this.vx += (targetX - this.x) * 0.003 * this.weavingStrength;
                        this.vy += (targetY - this.y) * 0.003 * this.weavingStrength;
                        this.vx *= 0.94;
                        this.vy *= 0.94;
                        
                        // 蜘蛛旋转
                        this.angle += 0.02 * this.weavingStrength;
                    } else {
                        this.weavingStrength = Math.max(this.weavingStrength - 0.08, 0);
                        this.x += this.vx;
                        this.y += this.vy;
                        
                        if (this.x < 0 || this.x > width) this.vx *= -1;
                        if (this.y < 0 || this.y > height) this.vy *= -1;
                    }
                }
                
                draw() {
                    const pulse = Math.sin(frameCount * 0.05 + this.legPhase);
                    const glowSize = this.size * (2.5 + pulse * 0.3);
                    const color = this.type.color;
                    
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    
                    // 绘制蜘蛛腿（8条）
                    if (this.type.hasLegs !== false) {
                        ctx.strokeStyle = 'rgba(' + color + ', ' + (this.brightness * 0.6) + ')';
                        ctx.lineWidth = 0.8;
                        for (let i = 0; i < 8; i++) {
                            const legAngle = (i / 8) * Math.PI * 2;
                            const legLen = this.size * (3 + Math.sin(frameCount * 0.1 + i) * 0.5);
                            const legBend = Math.sin(frameCount * 0.15 + i * 0.5) * 5;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.quadraticCurveTo(
                                Math.cos(legAngle) * legLen * 0.5 + legBend,
                                Math.sin(legAngle) * legLen * 0.5 + legBend,
                                Math.cos(legAngle) * legLen,
                                Math.sin(legAngle) * legLen
                            );
                            ctx.stroke();
                        }
                    }
                    
                    // 绘制光晕
                    ctx.beginPath();
                    if (this.type.shape === 'square') {
                        ctx.rect(-glowSize, -glowSize, glowSize * 2, glowSize * 2);
                    } else {
                        ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
                    }
                    ctx.fillStyle = 'rgba(' + color + ', ' + (this.brightness * 0.2) + ')';
                    ctx.fill();
                    
                    // 绘制蜘蛛身体（腹部）
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * 1.2, this.size * 0.9, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(' + color + ', ' + this.brightness + ')';
                    ctx.fill();
                    
                    // 绘制蜘蛛头胸部
                    ctx.beginPath();
                    ctx.ellipse(-this.size * 0.8, 0, this.size * 0.6, this.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(' + color + ', ' + (this.brightness * 0.8) + ')';
                    ctx.fill();
                    
                    // 绘制眼睛
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.beginPath();
                    ctx.arc(-this.size * 1.1, -this.size * 0.25, this.size * 0.15, 0, Math.PI * 2);
                    ctx.arc(-this.size * 1.1, this.size * 0.25, this.size * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 特殊效果
                    if (this.type.hasStardust && Math.random() > 0.8) {
                        for (let i = 0; i < 2; i++) {
                            const sx = (Math.random() - 0.5) * 40;
                            const sy = (Math.random() - 0.5) * 40;
                            ctx.beginPath();
                            ctx.arc(sx, sy, Math.random() * 1.5, 0, Math.PI * 2);
                            ctx.fillStyle = 'rgba(255, 255, 255, ' + (Math.random() * 0.6) + ')';
                            ctx.fill();
                        }
                    }
                    
                    ctx.restore();
                }
            }
            
            // 蛛网丝线类
            class WebThread {
                constructor(spider1, spider2) {
                    this.s1 = spider1;
                    this.s2 = spider2;
                    this.opacity = 0;
                    this.dewdrop = Math.random() > 0.7;
                    this.dewPhase = Math.random() * Math.PI * 2;
                }
                
                update() {
                    if (isWeaving) {
                        this.opacity = Math.min(this.opacity + 0.03, 0.9);
                    } else {
                        this.opacity = Math.max(this.opacity - 0.05, 0.15);
                    }
                }
                
                draw() {
                    const dx = this.s2.x - this.s1.x;
                    const dy = this.s2.y - this.s1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 500) return;
                    
                    // 蛛网丝线有轻微的下垂效果
                    const midX = (this.s1.x + this.s2.x) / 2;
                    const midY = (this.s1.y + this.s2.y) / 2 + Math.sin(frameCount * 0.05 + this.dewPhase) * 3;
                    
                    ctx.beginPath();
                    ctx.moveTo(this.s1.x, this.s1.y);
                    ctx.quadraticCurveTo(midX, midY, this.s2.x, this.s2.y);
                    ctx.strokeStyle = 'rgba(255, 215, 0, ' + this.opacity + ')';
                    ctx.lineWidth = isWeaving ? 1.5 : 0.5;
                    ctx.stroke();
                    
                    // 露珠效果
                    if (this.dewdrop && this.opacity > 0.5) {
                        ctx.beginPath();
                        ctx.arc(midX, midY, 2 + Math.sin(frameCount * 0.1 + this.dewPhase), 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255, 255, 255, ' + (this.opacity * 0.8) + ')';
                        ctx.fill();
                    }
                }
            }
            
            // 中心蛛网结构
            class CenterWeb {
                constructor() {
                    this.radius = 0;
                    this.maxRadius = 150;
                    this.spokes = 12;
                    this.rings = 5;
                }
                
                update() {
                    if (isWeaving) {
                        this.radius = Math.min(this.radius + 3, this.maxRadius);
                    } else {
                        this.radius = Math.max(this.radius - 5, 0);
                    }
                }
                
                draw() {
                    if (this.radius < 5) return;
                    
                    const cx = width / 2;
                    const cy = height / 2;
                    const alpha = Math.min(this.radius / this.maxRadius, 0.8);
                    
                    ctx.strokeStyle = 'rgba(255, 215, 0, ' + alpha + ')';
                    ctx.lineWidth = 1.5;
                    
                    // 绘制辐条（从中心向外）
                    for (let i = 0; i < this.spokes; i++) {
                        const angle = (i / this.spokes) * Math.PI * 2 + weavingProgress * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(
                            cx + Math.cos(angle) * this.radius,
                            cy + Math.sin(angle) * this.radius
                        );
                        ctx.stroke();
                    }
                    
                    // 绘制同心圆环
                    ctx.lineWidth = 0.8;
                    for (let i = 1; i <= this.rings; i++) {
                        const r = (this.radius / this.rings) * i;
                        ctx.beginPath();
                        ctx.arc(cx, cy, r, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(255, 215, 0, ' + (alpha * 0.6) + ')';
                        ctx.stroke();
                    }
                }
            }
            
            function initCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            
            function initSpiders() {
                spiders = [];
                let count = Math.floor((width * height) / 15000);
                count = Math.max(CONFIG.MIN_SPIDERS, Math.min(CONFIG.MAX_SPIDERS, count));
                for (let i = 0; i < count; i++) {
                    spiders.push(new SmartSpider());
                }
                centerWeb = new CenterWeb();
            }
            
            function updateWebThreads() {
                // 动态更新蛛网丝线
                webThreads = [];
                const maxDist = isWeaving ? 300 : 120;
                const maxConnections = isWeaving ? 4 : 2;
                
                for (let i = 0; i < spiders.length; i++) {
                    let connections = 0;
                    for (let j = i + 1; j < spiders.length; j++) {
                        if (connections >= maxConnections) break;
                        const dx = spiders[i].x - spiders[j].x;
                        const dy = spiders[i].y - spiders[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < maxDist) {
                            webThreads.push(new WebThread(spiders[i], spiders[j]));
                            connections++;
                        }
                    }
                }
            }
            
            function drawMouseConnections() {
                if (!mouse.x || !mouse.y) return;
                spiders.forEach(function(s) {
                    const dx = s.x - mouse.x, dy = s.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        const opacity = (1 - dist / 180) * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(s.x, s.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = 'rgba(' + s.type.color + ', ' + opacity + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                });
            }
            
            function animate(currentTime) {
                animationId = requestAnimationFrame(animate);
                frameCount++;
                if (isWeaving) weavingProgress += 0.02;
                
                const deltaTime = currentTime - lastFrameTime;
                if (deltaTime < frameInterval) return;
                lastFrameTime = currentTime - (deltaTime % frameInterval);
                
                ctx.clearRect(0, 0, width, height);
                
                // 更新和绘制中心蛛网
                if (centerWeb) {
                    centerWeb.update();
                    centerWeb.draw();
                }
                
                // 更新蛛网丝线
                updateWebThreads();
                webThreads.forEach(function(t) { t.update(); t.draw(); });
                
                // 鼠标连线
                drawMouseConnections();
                
                // 更新和绘制蜘蛛
                spiders.forEach(function(s) { s.update(); s.draw(); });
            }
            
            // 事件监听
            window.addEventListener('mousemove', function(e) {
                mouse.x = e.clientX;

            window.addEventListener('mouseleave', function() { mouse.x = null; mouse.y = null; });
            window.addEventListener('touchmove', function(e) {

            window.addEventListener('resize', function() { initCanvas(); initSpiders(); });
            document.addEventListener('visibilitychange', function() {

        function generate() {
            if (isGenerating) return;
            const prompt = promptInput.value.trim();
            if (!prompt) {
                promptInput.classList.add('error');
                showToast('请输入内容后再生成', 'error');
                setTimeout(function() { promptInput.classList.remove('error'); }, 500);
                promptInput.focus();
                return;
            }
            if (prompt.length > CONFIG.MAX_PROMPT_LENGTH) {
                showToast('输入内容超过' + CONFIG.MAX_PROMPT_LENGTH + '字符限制', 'error');
                return;
            }
            
            isGenerating = true;
            InputModule.addToHistory(prompt);
            
            SpiderCanvas.setWeaving(true);
            weavingAnimation.classList.add('show');
            weavingOverlay.classList.add('show');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="spinner"></div><span>结网中...</span>';
            generateBtn.classList.add('spinning');
            startLoadingText();
            resultSection.classList.remove('show');
            
            mockGenerate(prompt).then(function(result) {
                renderResult(result);
                resultSection.classList.add('show');
                SpiderCanvas.scatter();
                setTimeout(function() {
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }).catch(function(error) {
                renderError(error.message || '生成失败，请稍后重试');
                resultSection.classList.add('show');
            }).finally(function() {
                SpiderCanvas.setWeaving(false);
                weavingAnimation.classList.remove('show');
                weavingOverlay.classList.remove('show');
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span>生成</span>';
                generateBtn.classList.remove('spinning');
                stopLoadingText();
                isGenerating = false;
            });
        }
        
        function copyResult() {
            const text = resultContent.innerText;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(function() {
                    showToast('✓ 已复制到剪贴板');
                }).catch(function() {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                const success = document.execCommand('copy');
                if (success) {
                    showToast('✓ 已复制到剪贴板');
                } else {
                    showToast('复制失败，请手动复制', 'error');
                }
            } catch (err) {
                showToast('复制失败，请手动复制', 'error');
            }
            document.body.removeChild(textarea);
        }
        
        function exportResult() {
            const text = resultContent.innerText;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toLocaleDateString();
            a.download = '因子智蛛生成结果_' + date + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✓ 文件已导出');
        }
        
        function speakResult() {
            const text = resultContent.innerText;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1;
                utterance.pitch = 1;
                utterance.onstart = function() { showToast('🔊 开始朗读'); };
                utterance.onend = function() { showToast('朗读结束'); };
                window.speechSynthesis.speak(utterance);
            } else {
                showToast('您的浏览器不支持语音朗读', 'error');
            }
        }

        }
